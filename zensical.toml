[project]
site_name        = "GRIMMoire · Python Beginner Path"
site_description = "A beginner Python curriculum from the Grimm Club — from first command to published package."
site_url         = "https://thegrimmclub.github.io/grimmoire"
repo_url         = "https://github.com/TheGrimmClub/grimmoire"
repo_name        = "TheGrimmClub/grimmoire"
docs_dir         = "python/beginners"
copyright        = "Copyright &copy; 2026 Grimm Club"

nav = [
  { "Home" = "index.md" },
  { "English" = [
    { "Overview"                 = "en/index.md"                   },
    { "00 · Manifesto"           = "en/00-manifest.md"             },
    { "01 · Commands & Calls"    = "en/01-commands-and-calls.md"   },
    { "02 · Imports"             = "en/02-imports.md"              },
    { "03 · argparse"            = "en/03-argparse.md"             },
    { "04 · Variables & Values"  = "en/04-variables-and-values.md" },
    { "05 · Debugger"            = "en/05-debugger.md"             },
    { "06 · Conditions"          = "en/06-conditions.md"           },
    { "07 · Loops & Controls"    = "en/07-loops-and-loop-controls.md" },
    { "08 · Functions"           = "en/08-functions.md"            },
    { "09 · Classes"             = "en/09-classes.md"              },
    { "10 · Tooling · uv"        = "en/10-tooling-uv.md"           },
    { "11 · Create Your Package" = "en/11-create-your-package.md"  },
  ]},
  { "Deutsch" = [
    { "Übersicht"                = "de/index.md"                   },
    { "00 · Manifest"            = "de/00-manifest.md"             },
    { "01 · Befehle & Aufrufe"   = "de/01-commands-and-calls.md"   },
    { "02 · Imports"             = "de/02-imports.md"              },
    { "03 · argparse"            = "de/03-argparse.md"             },
    { "04 · Variablen & Werte"   = "de/04-variables-and-values.md" },
    { "05 · Debugger"            = "de/05-debugger.md"             },
    { "06 · Bedingungen"         = "de/06-conditions.md"           },
    { "07 · Schleifen & Steuerung" = "de/07-loops-and-loop-controls.md" },
    { "08 · Funktionen"          = "de/08-functions.md"            },
    { "09 · Klassen"             = "de/09-classes.md"              },
    { "10 · Werkzeug · uv"       = "de/10-tooling-uv.md"           },
    { "11 · Baue dein Paket"     = "de/11-create-your-package.md"  },
  ]},
]

[project.theme]
name    = "material"
language = "en"

[project.theme.palette]
scheme  = "slate"
primary = "yellow"
accent  = "amber"

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

[project.theme.features]
navigation.instant  = true
navigation.tracking = true
navigation.top      = true
content.code.copy   = true

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true

[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.admonition]
[project.markdown_extensions.tables]
