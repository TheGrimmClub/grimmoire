name: Deploy Grimmoire to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token, plus the OIDC id-token Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-flight production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true # pull the LFS-tracked PNG artwork in case pages reference it

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # The interpreter comes from requires-python in pyproject.toml, so the
      # build uses the same one a contributor gets locally.
      - name: Install Python
        run: uv python install

      # --frozen fails rather than silently re-resolving: the lockfile is the
      # contract between this build and everyone's `uv run`.
      - name: Install dependencies
        run: uv sync --frozen

      - name: Build site
        run: uv run zensical build --strict # fail the build on warnings

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
