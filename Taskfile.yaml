version: '3'

# grimmoire — the bilingual Zensical docs site.
# Solution code is single-sourced from python/beginners/snippets/*.py and pulled
# into the language pages at build time via Zensical's native snippets
# (`--8<-- "snippets/NAME.py"`), configured in zensical.toml.

# Zensical's version lives in pyproject.toml / uv.lock, so `uv run` and the
# Actions build cannot disagree about it. That is why there is no version var
# here any more — one place for it, not two.

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  docs:build:
    desc: Build the site into site/
    cmds:
      - uv run zensical build --strict

  docs:serve:
    desc: Serve the site locally with live reload
    cmds:
      - uv run zensical serve
